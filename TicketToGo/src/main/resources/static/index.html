<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TicketToGo - Sistema de Chamados</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --secondary-gradient: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            --success-gradient: linear-gradient(135deg, #84fab0 0%, #8fd3f4 100%);
            --warning-gradient: linear-gradient(135deg, #fad961 0%, #f76b1c 100%);
            --danger-gradient: linear-gradient(135deg, #f43b47 0%, #453a94 100%);
            --dark-gradient: linear-gradient(135deg, #2c3e50 0%, #3498db 100%);
            --glass-bg: rgba(255, 255, 255, 0.25);
            --glass-border: rgba(255, 255, 255, 0.18);
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* Fundo animado com partículas tecnológicas */
        .tech-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: linear-gradient(135deg, #0a192f 0%, #1a1a2e 50%, #16213e 100%);
            overflow: hidden;
        }

        /* Rede de linhas (como circuitos) */
        .grid-lines {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0, 255, 255, 0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 255, 0.1) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: gridMove 20s linear infinite;
        }

        @keyframes gridMove {
            0% { transform: translate(0, 0); }
            100% { transform: translate(50px, 50px); }
        }

        /* Bolhas de dados flutuantes */
        .data-bubble {
            position: absolute;
            border-radius: 50%;
            background: rgba(102, 126, 234, 0.15);
            box-shadow: 0 0 30px rgba(102, 126, 234, 0.3);
            animation: float 8s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-30px) scale(1.1); }
        }

        /* Partículas de conexão */
        .connection-particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: #00ffff;
            border-radius: 50%;
            box-shadow: 0 0 10px #00ffff, 0 0 20px #00ffff;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.5); }
        }

        /* Raios de luz digital */
        .light-beam {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 30% 50%, rgba(102, 126, 234, 0.1) 0%, transparent 50%);
            animation: beamMove 15s infinite alternate;
        }

        @keyframes beamMove {
            0% { transform: translateX(-20%) translateY(-20%) rotate(0deg); }
            100% { transform: translateX(20%) translateY(20%) rotate(10deg); }
        }

        /* Efeito de scanline */
        .scanline {
            position: absolute;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, #00ffff, transparent);
            animation: scan 8s linear infinite;
            opacity: 0.3;
        }

        @keyframes scan {
            0% { top: -10%; }
            100% { top: 110%; }
        }

        /* Header com efeito glassmorphism */
        .glass-header {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            padding: 40px 30px;
            margin-bottom: 40px;
            position: relative;
            z-index: 1;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            animation: slideDown 0.8s ease-out;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .glass-header h1 {
            font-size: 3.5em;
            font-weight: 700;
            background: linear-gradient(135deg, #fff 0%, #a0aec0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
            letter-spacing: -1px;
        }

        .glass-header p {
            color: rgba(255, 255, 255, 0.8);
            font-size: 1.2em;
            font-weight: 300;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        /* Cards com efeito 3D */
        .card-3d {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3), 0 0 0 2px rgba(255, 255, 255, 0.1);
            transform-style: preserve-3d;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            animation: scaleIn 0.6s ease-out;
            position: relative;
            overflow: hidden;
        }

        .card-3d::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.5s ease;
        }

        .card-3d:hover::before {
            left: 100%;
        }

        .card-3d:hover {
            transform: translateY(-10px) rotateX(2deg) rotateY(2deg);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4);
        }

        @keyframes scaleIn {
            from {
                opacity: 0;
                transform: scale(0.9);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 30px;
        }

        .card-header i {
            font-size: 2.5em;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .card-header h2 {
            font-size: 2em;
            font-weight: 600;
            background: linear-gradient(135deg, #2d3748 0%, #4a5568 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Inputs com efeito neon */
        .input-group {
            margin-bottom: 25px;
            position: relative;
        }

        .input-group label {
            display: block;
            margin-bottom: 10px;
            color: #4a5568;
            font-weight: 600;
            font-size: 0.95em;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
        }

        .input-group input,
        .input-group select,
        .input-group textarea {
            width: 100%;
            padding: 15px 20px;
            background: #f7fafc;
            border: 2px solid #e2e8f0;
            border-radius: 15px;
            font-size: 15px;
            font-family: inherit;
            transition: all 0.3s ease;
            color: #2d3748;
        }

        .input-group input:focus,
        .input-group select:focus,
        .input-group textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
            transform: translateY(-2px);
        }

        .input-group input:hover,
        .input-group select:hover,
        .input-group textarea:hover {
            border-color: #764ba2;
        }

        /* Botões com efeitos especiais */
        .btn {
            background: var(--primary-gradient);
            color: white;
            border: none;
            padding: 16px 32px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            position: relative;
            overflow: hidden;
            z-index: 1;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #764ba2 0%, #667eea 100%);
            z-index: -1;
            transition: opacity 0.3s ease;
            opacity: 0;
        }

        .btn:hover::before {
            opacity: 1;
        }

        .btn:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 20px 40px rgba(102, 126, 234, 0.4);
        }

        .btn:active {
            transform: translateY(0) scale(0.98);
        }

        .btn i {
            font-size: 1.2em;
            transition: transform 0.3s ease;
        }

        .btn:hover i {
            transform: translateX(5px) rotate(10deg);
        }

        /* Barra de navegação */
        .nav-bar {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .nav-item {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 15px 30px;
            border-radius: 50px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1;
            min-width: 150px;
        }

        .nav-item:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .nav-item.active {
            background: var(--primary-gradient);
            border-color: transparent;
        }

        .nav-item i {
            font-size: 1.2em;
        }

        /* Cards de chamados com efeitos especiais */
        .chamados-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 25px;
            margin-top: 25px;
        }

        .chamado-card-3d {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 25px;
            padding: 25px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            position: relative;
            overflow: hidden;
            animation: cardAppear 0.5s ease-out;
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        @keyframes cardAppear {
            from {
                opacity: 0;
                transform: translateY(30px) scale(0.9);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .chamado-card-3d::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 5px;
            background: linear-gradient(90deg, #667eea, #764ba2, #f093fb);
            transform: scaleX(0);
            transition: transform 0.3s ease;
        }

        .chamado-card-3d:hover::after {
            transform: scaleX(1);
        }

        .chamado-card-3d:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
        }

        .chamado-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            border-radius: 50px;
            font-size: 0.9em;
            font-weight: 600;
            margin-bottom: 15px;
        }

        .badge-recebido {
            background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%);
            color: #92400e;
        }

        .badge-andamento {
            background: linear-gradient(135deg, #c3dafe 0%, #a5b4fc 100%);
            color: #3730a3;
        }

        .badge-concluido {
            background: linear-gradient(135deg, #d1fae5 0%, #a7f3d0 100%);
            color: #065f46;
        }

        /* Filtros com animação */
        .filters-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .search-box {
            position: relative;
            margin-bottom: 20px;
        }

        .search-box i {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: #a0aec0;
            font-size: 1.2em;
            transition: color 0.3s ease;
        }

        .search-box input {
            width: 100%;
            padding: 18px 20px 18px 50px;
            border: 2px solid #e2e8f0;
            border-radius: 50px;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        .search-box input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
            padding-left: 55px;
        }

        .search-box input:focus + i {
            color: #667eea;
        }

        /* Estatísticas animadas */
        .stats-wrapper {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: linear-gradient(135deg, var(--color1), var(--color2));
            padding: 25px;
            border-radius: 20px;
            color: white;
            text-align: center;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.1), rgba(255, 255, 255, 0));
            transform: translateX(-100%);
            transition: transform 0.5s ease;
        }

        .stat-card:hover::before {
            transform: translateX(0);
        }

        .stat-card:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
        }

        .stat-number {
            font-size: 2.5em;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 1em;
            opacity: 0.9;
        }

        /* Notificação animada */
        .notification-3d {
            position: fixed;
            top: 30px;
            right: 30px;
            background: var(--success-gradient);
            color: white;
            padding: 20px 30px;
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            display: none;
            animation: notificationSlide 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 1000;
            border: 1px solid rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(10px);
        }

        @keyframes notificationSlide {
            from {
                opacity: 0;
                transform: translateX(100px) rotate(10deg);
            }
            to {
                opacity: 1;
                transform: translateX(0) rotate(0);
            }
        }

        /* Botão flutuante */
        .fab {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: var(--primary-gradient);
            color: white;
            border: none;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.5);
            transition: all 0.3s ease;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5em;
        }

        .fab:hover {
            transform: scale(1.1) rotate(90deg);
            box-shadow: 0 20px 40px rgba(102, 126, 234, 0.6);
        }

        /* Responsividade */
        @media (max-width: 768px) {
            body {
                padding: 10px;
            }
            
            .glass-header h1 {
                font-size: 2.5em;
            }
            
            .chamados-grid {
                grid-template-columns: 1fr;
            }
            
            .nav-item {
                min-width: 100%;
            }
            
            .stats-wrapper {
                grid-template-columns: 1fr 1fr;
            }
        }

        @media (max-width: 480px) {
            .stats-wrapper {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <!-- Fundo tecnológico animado -->
    <div class="tech-background">
        <div class="grid-lines"></div>
        <div class="light-beam"></div>
        <div class="scanline"></div>
        
        <!-- Bolhas de dados geradas via JavaScript -->
        <div id="data-bubbles"></div>
        
        <!-- Partículas de conexão geradas via JavaScript -->
        <div id="connection-particles"></div>
    </div>

    <div class="glass-header">
        <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 20px;">
            <div>
                <h1><i class="fas fa-ticket-alt"></i> TicketToGo</h1>
                <p>Sistema de Chamados com Experiência Imersiva</p>
            </div>
            <div style="display: flex; gap: 15px;">
                <span style="background: rgba(255, 255, 255, 0.2); padding: 10px 20px; border-radius: 50px; color: white;">
                    <i class="fas fa-clock"></i> <span id="liveTime"></span>
                </span>
            </div>
        </div>
    </div>

    <div class="container">
        <!-- Barra de Navegação -->
        <div class="nav-bar">
            <div class="nav-item active" onclick="navigateTo('todos')">
                <i class="fas fa-list"></i>
                <span>Todos Chamados</span>
            </div>
            <div class="nav-item" onclick="navigateTo('recebido')">
                <i class="fas fa-clock"></i>
                <span>Recebidos</span>
            </div>
            <div class="nav-item" onclick="navigateTo('andamento')">
                <i class="fas fa-spinner"></i>
                <span>Em Andamento</span>
            </div>
            <div class="nav-item" onclick="navigateTo('concluido')">
                <i class="fas fa-check-circle"></i>
                <span>Concluídos</span>
            </div>
        </div>

        <!-- Card de Criar Chamado -->
        <div class="card-3d">
            <div class="card-header">
                <i class="fas fa-plus-circle"></i>
                <h2>Abrir Novo Chamado</h2>
            </div>
            
            <form id="formChamado">
                <div class="input-group">
                    <label><i class="fas fa-user"></i> Nome do Solicitante</label>
                    <input type="text" id="solicitante" placeholder="Digite seu nome completo" required>
                </div>

                <div class="input-group">
                    <label><i class="fas fa-tag"></i> Categoria</label>
                    <select id="categoria">
                        <option value="Hardware">🔧 Hardware - Problemas com equipamentos</option>
                        <option value="Software">💻 Software - Erros em programas</option>
                        <option value="Rede">🌐 Rede - Conectividade e internet</option>
                        <option value="Outros">📌 Outros - Demais solicitações</option>
                    </select>
                </div>

                <div class="input-group">
                    <label><i class="fas fa-heading"></i> Título do Chamado</label>
                    <input type="text" id="titulo" placeholder="Ex: Computador não liga, Erro no sistema..." required>
                </div>

                <div class="input-group">
                    <label><i class="fas fa-align-left"></i> Descrição Detalhada</label>
                    <textarea id="descricao" placeholder="Descreva o problema com o máximo de detalhes possível..."></textarea>
                </div>

                <button type="submit" class="btn">
                    <i class="fas fa-paper-plane"></i> Criar Chamado Agora
                </button>
            </form>
        </div>

        <!-- Área de Chamados -->
        <div class="card-3d">
            <div class="card-header">
                <i class="fas fa-list"></i>
                <h2>Lista de Chamados</h2>
            </div>
            
            <div class="stats-wrapper" id="statsContainer"></div>
            
            <div class="filters-container">
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" id="filterSolicitante" placeholder="Pesquisar chamados pelo nome do solicitante...">
                </div>
                
                <div style="display: flex; gap: 15px; align-items: center; flex-wrap: wrap;">
                    <div style="flex: 1; min-width: 200px;">
                        <select id="filterStatus" style="width: 100%; padding: 15px 20px; border-radius: 50px; border: 2px solid #e2e8f0; background: white;">
                            <option value="">📊 Todos os status</option>
                            <option value="recebido">🕐 Recebidos</option>
                            <option value="andamento">⚙️ Em andamento</option>
                            <option value="concluido">✅ Concluídos</option>
                        </select>
                    </div>
                    <button class="btn" onclick="clearFilters()" style="background: var(--danger-gradient);">
                        <i class="fas fa-times"></i> Limpar Filtros
                    </button>
                </div>
            </div>
            
            <div id="listaChamados"></div>
        </div>
    </div>

    <button class="fab" onclick="scrollToTop()">
        <i class="fas fa-arrow-up"></i>
    </button>

    <div class="notification-3d" id="notification">
        <i class="fas fa-check-circle"></i> <span id="notificationMessage"></span>
    </div>

    <script>
        const API_URL = "http://localhost:8080/api/chamados";
        let chamados = [];
        let filteredChamados = [];

        // Criar elementos de fundo tecnológico
        function createTechBackground() {
            const bubblesContainer = document.getElementById('data-bubbles');
            const particlesContainer = document.getElementById('connection-particles');
            
            // Criar bolhas de dados
            for (let i = 0; i < 15; i++) {
                const bubble = document.createElement('div');
                bubble.className = 'data-bubble';
                const size = Math.random() * 200 + 50;
                bubble.style.width = size + 'px';
                bubble.style.height = size + 'px';
                bubble.style.left = Math.random() * 100 + '%';
                bubble.style.top = Math.random() * 100 + '%';
                bubble.style.animationDelay = Math.random() * 5 + 's';
                bubble.style.animationDuration = (Math.random() * 10 + 10) + 's';
                bubblesContainer.appendChild(bubble);
            }
            
            // Criar partículas de conexão
            for (let i = 0; i < 50; i++) {
                const particle = document.createElement('div');
                particle.className = 'connection-particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.top = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 2 + 's';
                particle.style.animationDuration = (Math.random() * 3 + 2) + 's';
                particlesContainer.appendChild(particle);
            }
        }

        // Atualizar relógio
        function updateTime() {
            const now = new Date();
            const timeString = now.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            document.getElementById('liveTime').textContent = timeString;
        }

        $(document).ready(function() {
            createTechBackground();
            setInterval(updateTime, 1000);
            carregarChamados();
            
            $("#formChamado").submit(function(e) {
                e.preventDefault();
                criarChamado();
            });

            $("#filterSolicitante, #filterStatus").on("input change", function() {
                aplicarFiltros();
            });

            // Animação de entrada dos cards
            $(".card-3d").each(function(index) {
                $(this).css("animation-delay", index * 0.2 + "s");
            });
        });

        function showNotification(message, type = 'success') {
            $("#notificationMessage").text(message);
            $("#notification").fadeIn(300).delay(3000).fadeOut(300);
            
            // Feedback tátil (vibração) se suportado
            if (window.navigator.vibrate) {
                window.navigator.vibrate(200);
            }
        }

        function carregarChamados() {
            $("#listaChamados").html(`
                <div class="loading" style="text-align: center; padding: 60px;">
                    <i class="fas fa-spinner fa-spin" style="font-size: 3em; color: #667eea;"></i>
                    <br>
                    <span style="color: #4a5568; margin-top: 20px; display: block;">Carregando chamados mágicos...</span>
                </div>
            `);
            
            $.ajax({
                url: API_URL,
                method: "GET",
                success: function(data) {
                    chamados = data;
                    filteredChamados = [...chamados];
                    renderizarChamados();
                    atualizarStats();
                    
                    // Efeito de confete ao carregar
                    if (chamados.length > 0) {
                        showNotification(`${chamados.length} chamados carregados com sucesso!`);
                    }
                },
                error: function() {
                    $("#listaChamados").html(`
                        <div class="empty-state" style="text-align: center; padding: 60px;">
                            <i class="fas fa-exclamation-triangle" style="font-size: 3em; color: #f56565;"></i>
                            <br>
                            <span style="color: #4a5568; margin-top: 20px; display: block;">
                                Erro ao conectar com API. Verifique se o servidor está rodando.
                            </span>
                        </div>
                    `);
                }
            });
        }

        function criarChamado() {
            const solicitante = $("#solicitante").val();
            if (!solicitante) {
                showNotification("Por favor, digite o nome do solicitante!", "error");
                return;
            }

            const chamado = {
                solicitante: solicitante,
                categoria: $("#categoria").val(),
                titulo: $("#titulo").val(),
                descricao: $("#descricao").val(),
                status: "recebido"
            };

            $.ajax({
                url: API_URL,
                method: "POST",
                contentType: "application/json",
                data: JSON.stringify(chamado),
                success: function() {
                    $("#formChamado")[0].reset();
                    carregarChamados();
                    showNotification("✨ Chamado criado com sucesso!");
                    
                    // Scroll suave para a lista
                    $('html, body').animate({
                        scrollTop: $("#listaChamados").offset().top - 100
                    }, 500);
                },
                error: function() {
                    showNotification("Erro ao criar chamado!", "error");
                }
            });
        }

        function alterarStatus(id, novoStatus) {
            const statusText = {
                'recebido': 'Recebido',
                'andamento': 'Em Andamento',
                'concluido': 'Concluído'
            }[novoStatus];

            $.ajax({
                url: API_URL + "/" + id + "/status",
                method: "PUT",
                contentType: "application/json",
                data: JSON.stringify({ status: novoStatus }),
                success: function() {
                    carregarChamados();
                    showNotification(`✅ Status alterado para "${statusText}"`);
                }
            });
        }

        function navigateTo(status) {
            $(".nav-item").removeClass("active");
            $(event.currentTarget).addClass("active");
            
            if (status === 'todos') {
                $("#filterStatus").val("");
            } else {
                $("#filterStatus").val(status);
            }
            
            aplicarFiltros();
        }

        function aplicarFiltros() {
            const solicitanteFilter = $("#filterSolicitante").val().toLowerCase();
            const statusFilter = $("#filterStatus").val();

            filteredChamados = chamados.filter(c => {
                const matchSolicitante = c.solicitante.toLowerCase().includes(solicitanteFilter);
                const matchStatus = !statusFilter || c.status === statusFilter;
                return matchSolicitante && matchStatus;
            });

            renderizarChamados();
            
            if (filteredChamados.length === 0 && (solicitanteFilter || statusFilter)) {
                showNotification("🔍 Nenhum chamado encontrado com os filtros aplicados");
            }
        }

        function clearFilters() {
            $("#filterSolicitante").val("");
            $("#filterStatus").val("");
            $(".nav-item").removeClass("active");
            $(".nav-item:first").addClass("active");
            filteredChamados = [...chamados];
            renderizarChamados();
        }

        function atualizarStats() {
            const total = chamados.length;
            const recebidos = chamados.filter(c => c.status === 'recebido').length;
            const andamento = chamados.filter(c => c.status === 'andamento').length;
            const concluidos = chamados.filter(c => c.status === 'concluido').length;

            const statsHtml = `
                <div class="stat-card" style="--color1: #667eea; --color2: #764ba2;">
                    <div class="stat-number">${total}</div>
                    <div class="stat-label">Total de Chamados</div>
                    <i class="fas fa-ticket-alt" style="position: absolute; bottom: 10px; right: 10px; font-size: 3em; opacity: 0.2;"></i>
                </div>
                <div class="stat-card" style="--color1: #f6ad55; --color2: #ed8936;">
                    <div class="stat-number">${recebidos}</div>
                    <div class="stat-label">Recebidos</div>
                    <i class="fas fa-clock" style="position: absolute; bottom: 10px; right: 10px; font-size: 3em; opacity: 0.2;"></i>
                </div>
                <div class="stat-card" style="--color1: #4299e1; --color2: #3182ce;">
                    <div class="stat-number">${andamento}</div>
                    <div class="stat-label">Em Andamento</div>
                    <i class="fas fa-spinner" style="position: absolute; bottom: 10px; right: 10px; font-size: 3em; opacity: 0.2;"></i>
                </div>
                <div class="stat-card" style="--color1: #48bb78; --color2: #38a169;">
                    <div class="stat-number">${concluidos}</div>
                    <div class="stat-label">Concluídos</div>
                    <i class="fas fa-check-circle" style="position: absolute; bottom: 10px; right: 10px; font-size: 3em; opacity: 0.2;"></i>
                </div>
            `;

            $("#statsContainer").html(statsHtml);
        }

        function renderizarChamados() {
            if (filteredChamados.length === 0) {
                $("#listaChamados").html(`
                    <div class="empty-state" style="text-align: center; padding: 60px;">
                        <i class="fas fa-inbox" style="font-size: 4em; color: #cbd5e0;"></i>
                        <br>
                        <span style="color: #4a5568; margin-top: 20px; display: block; font-size: 1.2em;">
                            Nenhum chamado encontrado
                        </span>
                        <p style="color: #718096; margin-top: 10px;">
                            Tente ajustar os filtros ou criar um novo chamado
                        </p>
                    </div>
                `);
                return;
            }

            let html = '<div class="chamados-grid">';
            
            filteredChamados.forEach((c, index) => {
                const statusClass = c.status || 'recebido';
                const statusText = {
                    'recebido': 'Recebido',
                    'andamento': 'Em Andamento',
                    'concluido': 'Concluído'
                }[statusClass] || 'Recebido';

                const statusIcon = {
                    'recebido': 'fa-clock',
                    'andamento': 'fa-spinner fa-spin',
                    'concluido': 'fa-check-circle'
                }[statusClass];

                const badgeClass = {
                    'recebido': 'badge-recebido',
                    'andamento': 'badge-andamento',
                    'concluido': 'badge-concluido'
                }[statusClass];

                html += `
                    <div class="chamado-card-3d" style="animation-delay: ${index * 0.1}s">
                        <div class="chamado-badge ${badgeClass}">
                            <i class="fas ${statusIcon}"></i> ${statusText}
                        </div>
                        
                        <h3 style="font-size: 1.4em; color: #2d3748; margin-bottom: 15px;">${c.titulo}</h3>
                        
                        <div style="display: flex; flex-wrap: wrap; gap: 15px; margin-bottom: 20px;">
                            <div style="flex: 1; min-width: 120px;">
                                <div style="display: flex; align-items: center; gap: 8px; color: #718096; margin-bottom: 5px;">
                                    <i class="fas fa-user" style="color: #667eea;"></i>
                                    <span style="font-size: 0.9em;">Solicitante</span>
                                </div>
                                <div style="font-weight: 600; color: #2d3748;">${c.solicitante}</div>
                            </div>
                            
                            <div style="flex: 1; min-width: 120px;">
                                <div style="display: flex; align-items: center; gap: 8px; color: #718096; margin-bottom: 5px;">
                                    <i class="fas fa-tag" style="color: #9f7aea;"></i>
                                    <span style="font-size: 0.9em;">Categoria</span>
                                </div>
                                <div style="font-weight: 600; color: #2d3748;">${c.categoria}</div>
                            </div>
                            
                            <div style="flex: 1; min-width: 120px;">
                                <div style="display: flex; align-items: center; gap: 8px; color: #718096; margin-bottom: 5px;">
                                    <i class="fas fa-hashtag" style="color: #ed8936;"></i>
                                    <span style="font-size: 0.9em;">ID</span>
                                </div>
                                <div style="font-weight: 600; color: #2d3748;">#${c.id}</div>
                            </div>
                        </div>
                        
                        ${c.descricao ? `
                        <div style="background: #f7fafc; padding: 15px; border-radius: 12px; margin-bottom: 20px; border-left: 4px solid #667eea;">
                            <p style="color: #4a5568; font-style: italic; margin: 0;">
                                <i class="fas fa-quote-left" style="color: #cbd5e0; margin-right: 5px;"></i>
                                ${c.descricao}
                            </p>
                        </div>
                        ` : ''}
                        
                        <div style="display: flex; gap: 10px; margin-top: 20px; flex-wrap: wrap;">
                            <button onclick="alterarStatus(${c.id},'recebido')" 
                                    style="flex: 1; padding: 12px; border: none; border-radius: 10px; background: linear-gradient(135deg, #f6ad55 0%, #ed8936 100%); color: white; font-weight: 600; cursor: pointer; transition: all 0.3s ease; display: flex; align-items: center; justify-content: center; gap: 5px;">
                                <i class="fas fa-clock"></i> Recebido
                            </button>
                            <button onclick="alterarStatus(${c.id},'andamento')" 
                                    style="flex: 1; padding: 12px; border: none; border-radius: 10px; background: linear-gradient(135deg, #4299e1 0%, #3182ce 100%); color: white; font-weight: 600; cursor: pointer; transition: all 0.3s ease; display: flex; align-items: center; justify-content: center; gap: 5px;">
                                <i class="fas fa-spinner"></i> Andamento
                            </button>
                            <button onclick="alterarStatus(${c.id},'concluido')" 
                                    style="flex: 1; padding: 12px; border: none; border-radius: 10px; background: linear-gradient(135deg, #48bb78 0%, #38a169 100%); color: white; font-weight: 600; cursor: pointer; transition: all 0.3s ease; display: flex; align-items: center; justify-content: center; gap: 5px;">
                                <i class="fas fa-check"></i> Concluído
                            </button>
                        </div>
                    </div>
                `;
            });

            html += '</div>';
            $("#listaChamados").html(html);
        }

        function scrollToTop() {
            $('html, body').animate({ scrollTop: 0 }, 500);
        }
    </script>
</body>
</html>
